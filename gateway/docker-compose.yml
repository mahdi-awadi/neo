# Neo customer email gateway. Joins the `proxy` network so (a) Traefik routes
# neo-api.tech-gate.online to it via these labels, and (b) it can reach the Neo daemon on the
# host at 172.20.0.1:3003 (the proxy network's gateway). Holds NO Cloudflare/Claude creds.
#   ./build.sh && docker compose up -d --build
services:
  neo-gateway:
    build: .
    image: neo-gateway:latest
    container_name: neo-gateway
    restart: unless-stopped
    env_file: .env
    networks: [proxy]
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.neoapi.rule=Host(`neo-api.tech-gate.online`)"
      - "traefik.http.routers.neoapi.entrypoints=https"
      - "traefik.http.routers.neoapi.tls.certresolver=cloudflare"
      - "traefik.http.services.neoapi.loadbalancer.server.port=8080"
      - "traefik.http.routers.neoapi-http.rule=Host(`neo-api.tech-gate.online`)"
      - "traefik.http.routers.neoapi-http.entrypoints=http"
      - "traefik.http.routers.neoapi-http.middlewares=neoapi-redirect"
      - "traefik.http.middlewares.neoapi-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.neoapi-redirect.redirectscheme.permanent=true"

networks:
  proxy:
    external: true
